<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stefan Kochert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
    }

    .character {
      font-size: 80px;
      animation: wave 2s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(18deg); }
      75%       { transform: rotate(-8deg); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-top: 24px;
      letter-spacing: -0.5px;
    }

    p {
      margin-top: 12px;
      color: #888;
      font-size: 1.05rem;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }

    .status {
      margin-top: 32px;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="character">👋</div>
    <h1>Hello, World.</h1>
    <p>Ich bin Stefan — schön dass du da bist.</p>
    <div class="status">
      <span class="dot"></span>Website im Aufbau
    </div>
  </div>
</body>
</html>
