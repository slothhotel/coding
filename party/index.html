<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vereinsgrillparty – Erstes Juli-Wochenende</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .emoji-row {
      font-size: 56px;
      display: flex;
      justify-content: center;
      gap: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-top: 28px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .tagline {
      margin-top: 12px;
      color: #aaa;
      font-size: 1.05rem;
    }

    .divider {
      margin: 32px auto;
      width: 40px;
      height: 2px;
      background: #f97316;
      border-radius: 2px;
    }

    .info-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .info-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
    }

    .info-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .info-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 2px;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 600;
      color: #f0f0f0;
    }

    .info-value.placeholder {
      color: #444;
      font-style: italic;
      font-weight: 400;
    }

    .badge {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 0.85rem;
      color: #888;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #f97316;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="emoji-row">
      <span>⚽</span>
      <span>🔥</span>
      <span>🌳</span>
    </div>

    <h1>Grillparty<br>im Park</h1>
    <p class="tagline">Vereinsfeier — erstes Juli-Wochenende 2026</p>

    <div class="divider"></div>

    <div class="info-grid">

      <div class="info-item">
        <span class="info-icon">📅</span>
        <div>
          <div class="info-label">Wann</div>
          <div class="info-value">Samstag, 4. Juli 2026</div>
        </div>
      </div>

      <div class="info-item">
        <span class="info-icon">📍</span>
        <div>
          <div class="info-label">Wo</div>
          <div class="info-value placeholder">Ort folgt noch</div>
        </div>
      </div>

      <div class="info-item">
        <span class="info-icon">🕒</span>
        <div>
          <div class="info-label">Uhrzeit</div>
          <div class="info-value placeholder">Uhrzeit folgt noch</div>
        </div>
      </div>

      <div class="info-item">
        <span class="info-icon">🍖</span>
        <div>
          <div class="info-label">Was</div>
          <div class="info-value">Grillen &amp; gute Zeit</div>
        </div>
      </div>

    </div>

    <div class="badge">
      <div class="dot"></div>
      Weitere Infos folgen in Kürze
    </div>

  </div>
</body>
</html>
